# cargo-deny configuration. Tune the allowed license set as real dependencies land.

[advisories]
yanked = "deny"
# Security advisories from the RustSec database fail the build by default.

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
