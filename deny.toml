# cargo-deny configuration. Tune the allowed license set as real dependencies land.

[advisories]
yanked = "deny"
# Security advisories from the RustSec database fail the build by default.

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal path dependencies (e.g. the cli depending on the backend) resolve to a
# wildcard version requirement; allow that without weakening the external check.
allow-wildcard-paths = true

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
]
# Our own workspace crates are unpublished; skip the license check for them.
private = { ignore = true }

[sources]
unknown-registry = "deny"
unknown-git = "deny"
