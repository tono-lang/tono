# SonarQube Cloud configuration.
# Fill organization/projectKey from the Sonar UI after connecting the repo,
# then add a SONAR_TOKEN secret to the repo/org for the Sonar workflow to run.
sonar.organization=tono-lang
sonar.projectKey=tono-lang_tono
sonar.host.url=https://sonarcloud.io

sonar.sources=.
# OCaml is not analyzed by Sonar; exclude the OCaml trees and build output. The
# codegen-tests/ harness crates and the integration-test harnesses are test
# fixtures (generated SDKs, drivers, end-to-end orchestration), not product
# source, so they are excluded from analysis too.
sonar.exclusions=**/target/**,**/_build/**,**/node_modules/**,frontend/**,lsp/**,**/codegen-tests/**,backend/tests/**

# Rust coverage import: the Sonar job runs cargo-llvm-cov to produce lcov.info.
sonar.rust.lcov.reportPaths=lcov.info
