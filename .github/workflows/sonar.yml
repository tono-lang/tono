name: Sonar

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  sonarqube:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Note when token is absent
        if: env.SONAR_TOKEN == ''
        run: echo "SONAR_TOKEN secret not set; skipping analysis until the Sonar account is connected."
      - uses: actions/checkout@v4
        if: env.SONAR_TOKEN != ''
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        if: env.SONAR_TOKEN != ''
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        if: env.SONAR_TOKEN != ''
      - uses: taiki-e/install-action@v2
        if: env.SONAR_TOKEN != ''
        with:
          tool: cargo-llvm-cov
      - name: Generate Rust coverage for Sonar
        if: env.SONAR_TOKEN != ''
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: SonarQube Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
