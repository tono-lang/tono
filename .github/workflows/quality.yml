name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  duplication:
    name: Duplication (jscpd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: jscpd (fail if duplication > 3%)
        # min-tokens 75 (~8-10 lines) ignores the small, unavoidable structural
        # overlap between the independent per-language codegen targets (their
        # Target impls, render-rule match arms, and primitive maps) while still
        # catching real copy-paste blocks; the shared logic itself lives in the
        # engine's conventions/test-support modules.
        run: >
          npx --yes jscpd .
          --threshold 3
          --min-tokens 75
          --reporters consoleFull
          --ignore "**/target/**,**/_build/**,**/node_modules/**,**/*.lock"

  file-size:
    name: File size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check file sizes
        run: bash scripts/check-file-size.sh

  unused-deps:
    name: Unused deps (cargo-machete)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master
