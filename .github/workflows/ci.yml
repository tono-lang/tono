name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (warnings = errors)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Test + coverage (lines >= 95%)
        run: cargo llvm-cov --workspace --fail-under-lines 95 --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-lcov
          path: lcov.info
          if-no-files-found: ignore

  ocaml:
    name: OCaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014 # v3
        with:
          ocaml-compiler: "5.2"
      - name: Install tooling and frontend dependencies
        run: opam install ocamlformat bisect_ppx yojson alcotest qcheck-core --yes
      - name: Format check
        run: opam exec -- dune build @fmt
      - name: Build (warnings = errors)
        run: opam exec -- dune build
      - name: Test
        run: opam exec -- dune runtest
      - name: Coverage (lines >= 95%)
        run: |
          opam exec -- dune runtest --instrument-with bisect_ppx --force
          opam exec -- bisect-ppx-report summary | tee coverage.txt
          pct=$(grep -oE '[0-9]+(\.[0-9]+)?%' coverage.txt | head -1 | tr -d '%')
          echo "OCaml line coverage: ${pct:-0}%"
          awk -v p="${pct:-0}" 'BEGIN { exit (p+0 >= 95) ? 0 : 1 }' \
            || { echo "::error::OCaml coverage ${pct:-0}% is below 95%"; exit 1; }

  typescript:
    name: TypeScript codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install the TypeScript toolchain
        run: npm ci --ignore-scripts
        working-directory: backend/codegen-tests/typescript
      - name: Generate, compile, and round-trip the emitted TypeScript
        run: cargo test --test typescript_roundtrip

  rust-codegen:
    name: Rust codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Generate, compile, and round-trip the emitted Rust
        run: cargo test --test rust_roundtrip

  go-codegen:
    name: Go codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.21"
      - name: Generate, compile, and round-trip the emitted Go
        run: cargo test --test go_roundtrip

  conformance:
    name: Cross-language conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.21"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install the TypeScript toolchain
        run: npm ci --ignore-scripts
        working-directory: backend/codegen-tests/typescript
      - name: Check that all three targets agree on the wire
        run: cargo test --test conformance

  e2e:
    name: End-to-end example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014 # v3
        with:
          ocaml-compiler: "5.2"
      - name: Install the frontend's OCaml dependencies
        run: opam install yojson --yes
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.21"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install the TypeScript toolchain (prettier, tsc)
        run: npm ci --ignore-scripts
        working-directory: backend/codegen-tests/typescript
      - name: Regenerate the example end to end
        run: scripts/regen-example.sh
      - name: Verify the committed example is up to date
        run: |
          if ! git diff --quiet -- examples/; then
            git diff -- examples/
            echo "::error::examples/ is stale; run scripts/regen-example.sh and commit the result"
            exit 1
          fi
      - name: Verify the generated SDKs compile
        run: scripts/check-example-compiles.sh

  # Single aggregating check - this is the one to mark "required" in branch protection.
  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    needs: [rust, ocaml, typescript, rust-codegen, go-codegen, conformance, e2e]
    if: always()
    steps:
      - name: Verify required jobs
        run: |
          if [ "${{ needs.rust.result }}" != "success" ] \
            || [ "${{ needs.ocaml.result }}" != "success" ] \
            || [ "${{ needs.typescript.result }}" != "success" ] \
            || [ "${{ needs.rust-codegen.result }}" != "success" ] \
            || [ "${{ needs.go-codegen.result }}" != "success" ] \
            || [ "${{ needs.conformance.result }}" != "success" ] \
            || [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs passed."
